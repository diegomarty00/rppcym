<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://thymeleaf.org">
<head th:replace="fragments/head"></head>
<body>

<nav th:replace="fragments/nav"></nav>

<div class="container">
    <h2 th:text="#{space.edit.title}">Editar espacio</h2>

    <!-- Error message -->
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert"
         th:text="${errorMessage}">
        Error al actualizar el espacio.
    </div>

    <form class="form-horizontal"
          th:object="${space}"
          method="post"
          th:action="@{'/space/edit/' + ${space.id}}">

        <!-- TYPE -->
        <div class="form-group">
            <label class="control-label col-sm-2" for="type" th:text="#{space.type}"></label>
            <div class="col-sm-10">
                <select th:field="*{type}" class="form-control" id="type">
                    <option th:each="t : ${spaceTypes}"
                            th:value="${t}"
                            th:text="${t}"
                            th:selected="${t == space.type}">
                    </option>
                </select>
            </div>
        </div>

        <!-- NAME -->
        <div class="form-group">
            <label for="name" th:text="#{space.name}">Name</label>
            <input class="form-control"
                   id="name"
                   th:field="*{name}"
                   th:placeholder="#{space.placeholder.name}"/>

            <!-- ERROR NAME -->
            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <!-- LOCATION -->
        <div class="form-group">
            <label for="location" th:text="#{space.location}">Location</label>
            <input class="form-control"
                   id="location"
                   th:field="*{location}"
                   th:placeholder="#{space.placeholder.location}"/>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('location')}"
                 th:errors="*{location}">
            </div>
        </div>

        <!-- CAPACITY -->
        <div class="form-group">
            <label for="capacity" th:text="#{space.capacity}">Capacity</label>
            <input class="form-control"
                   id="capacity"
                   th:field="*{capacity}"
                   th:placeholder="#{space.placeholder.capacity}"/>

            <!-- ERROR CAPACITY -->
            <div class="text-danger"
                 th:if="${#fields.hasErrors('capacity')}"
                 th:errors="*{capacity}">
            </div>
        </div>

        <!-- SUBMIT -->
        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-10">
                <button type="submit" class="btn btn-primary"
                        th:text="#{space.edit.save}">Guardar cambios</button>
            </div>
        </div>

    </form>
</div>

<footer th:replace="fragments/footer"></footer>
</body>
</html>
