<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
    <h1 th:text="#{spaces.availability}">Availability</h1>
    <h2 th:text="${space.name}">Space</h2>

    <p sec:authorize="hasRole('ADMIN')">
        <a class="btn btn-warning" th:href="@{/space/{id}/blocks/add(id=${space.id})}">
            Crear bloqueo de mantenimiento
        </a>
    </p>

    <form class="form-inline mb-3" method="get" th:action="@{/space/{id}/availability(id=${space.id})}">
        <div class="form-group mr-2">
            <label class="mr-2" th:text="#{availability.from}">From</label>
            <input class="form-control" type="datetime-local" name="from" th:value="${from}">
        </div>
        <div class="form-group mr-2">
            <label class="mr-2" th:text="#{availability.to}">To</label>
            <input class="form-control" type="datetime-local" name="to" th:value="${to}">
        </div>
        <button class="btn btn-primary" type="submit" th:text="#{availability.check}">Check</button>
    </form>

    <div th:if="${from != null and to != null}">
        <h3 th:text="#{availability.reservations}">Active reservations</h3>
        <div th:replace="~{fragments/availabilityReservationsTable :: availabilityReservationsTable}"></div>

        <h3 th:text="#{availability.blocks}">Maintenance blocks</h3>
        <div th:replace="~{fragments/availabilityBlocksTable :: availabilityBlocksTable}"></div>
    </div>

    <h3 sec:authorize="hasRole('ADMIN')">Histórico de bloqueos</h3>
    <div sec:authorize="hasRole('ADMIN')">
        <div th:insert="~{fragments/spaceBlocksHistoryTable :: spaceBlocksHistoryTable}"></div>
    </div>

    <p>
        <a class="btn btn-link" th:href="@{/space/details/{id}(id=${space.id})}" th:text="#{spaces.back.space}">Back to space</a>
    </p>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
