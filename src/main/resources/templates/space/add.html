<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head}"></head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1 th:text="#{space.add.title}">Add space</h1>

    <!-- FORMULARIO VINCULADO AL OBJETO 'space' -->
    <form method="post" th:action="@{/space/add}" th:object="${space}">

        <!-- ERRORES GLOBALES (igual que reservations/add) -->
        <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
            <p class="mb-0"
               th:each="error : ${#fields.globalErrors()}"
               th:text="${error}">
                Validation error
            </p>
        </div>

        <!-- TYPE -->
        <div class="form-group">
            <label for="type" th:text="#{space.type}">Type</label>
            <select class="form-control" id="type" th:field="*{type}">
                <option th:each="t : ${spaceTypes}"
                        th:value="${t}"
                        th:text="${t}">
                </option>
            </select>
        </div>

        <!-- NAME -->
        <div class="form-group">
            <label for="name" th:text="#{space.name}">Name</label>
            <input class="form-control"
                   id="name"
                   th:field="*{name}"
                   th:placeholder="#{space.placeholder.name}"/>

            <!-- ERROR NAME -->
            <div class="text-danger"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>

        <!-- LOCATION -->
        <div class="form-group">
            <label for="location" th:text="#{space.location}">Location</label>
            <input class="form-control"
                   id="location"
                   th:field="*{location}"
                   th:placeholder="#{space.placeholder.location}"/>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('location')}"
                 th:errors="*{location}">
            </div>
        </div>

        <!-- CAPACITY -->
        <div class="form-group">
            <label for="capacity" th:text="#{space.capacity}">Capacity</label>
            <input class="form-control"
                   id="capacity"
                   th:field="*{capacity}"
                   th:placeholder="#{space.placeholder.capacity}"/>

            <!-- ERROR CAPACITY -->
            <div class="text-danger"
                 th:if="${#fields.hasErrors('capacity')}"
                 th:errors="*{capacity}">
            </div>
        </div>

        <!-- SUBMIT -->
        <button class="btn btn-primary"
                type="submit"
                th:text="#{form.submit}">
            Submit
        </button>

    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
