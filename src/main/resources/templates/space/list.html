<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
    <h1 th:text="#{spaces.title}">Available spaces</h1>
    <form class="form-inline mb-3" method="get" th:action="@{/space}">
        <div class="form-group mr-2">
            <label class="mr-2" th:text="#{spaces.filter.type}">Type</label>
            <input class="form-control" type="text" name="type" th:value="${type}">
        </div>
        <div class="form-group mr-2">
            <label class="mr-2" th:text="#{spaces.filter.capacity}">Min capacity</label>
            <input class="form-control" type="number" name="minCapacity" min="1" th:value="${minCapacity}">
        </div>
        <button class="btn btn-primary" type="submit" th:text="#{spaces.filter.submit}">Filter</button>
    </form>
    <div th:replace="~{fragments/spacesTable :: spacesTable}"></div>
</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
